<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDSCII Font Helper</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8; /* DIS Blue */
            --border: #334155;
            --highlight: #facc15;
            --ascii-white: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 600px;
            text-align: center;
        }

        .legend {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.dis { background: var(--accent); }
        .dot.ascii { background: var(--ascii-white); }

        .controls {
            margin-bottom: 2rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
        }

        .cell {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            position: relative;
        }

        .cell:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .cell.highlight {
            border-color: var(--highlight);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        canvas {
            image-rendering: pixelated;
            margin-bottom: 0.5rem;
            background: #000;
            padding: 4px;
            border-radius: 4px;
        }

        .id-val {
            font-family: monospace;
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
            margin: 0.25rem 0;
        }

        .info {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--ascii-white);
            text-align: center;
        }

        .char-label {
            position: absolute;
            top: 4px;
            right: 8px;
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .idx-label {
            position: absolute;
            top: 6px;
            left: 8px;
            color: #475569;
            font-size: 0.6rem;
            font-family: monospace;
        }

        #status {
            margin-top: 2rem;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>

                const cell = document.createElement('div');
                cell.className = 'cell';
                if (filter && (char === filter || asciiHex.toLowerCase() === lowerFilter || disHex.toLowerCase() === lowerFilter)) {
                    cell.classList.add('highlight');
                }

                const canvas = document.createElement('canvas');
                canvas.width = 6 * 4;
                canvas.height = 8 * 4;
                drawGlyph(canvas, targetId);

                // Construct structure
                const idxLabel = document.createElement('div');
                idxLabel.className = 'idx-label';
                idxLabel.innerText = i; // Small decimal for reference
                
                const charLabel = document.createElement('div');
                charLabel.className = 'char-label';
                charLabel.innerText = getPrintable(i);
                
                const idVal = document.createElement('div');
                idVal.className = 'id-val';
                idVal.innerText = disHex;
                
                const info = document.createElement('div');
                info.className = 'info';
                info.innerText = asciiHex;

                cell.appendChild(idxLabel);
                cell.appendChild(charLabel);
                cell.appendChild(canvas);
                cell.appendChild(idVal);
                cell.appendChild(info);

                grid.appendChild(cell);
            }
            const status = document.getElementById('status');
            if (status) status.innerText = `Loaded ${Object.keys(FONT_DATA).length} font entries. Showing ${grid.children.length} results.`;
        }

        function getPrintable(i) {
            if (i < 32 || i === 127) return '•';
            if (i === 32) return 'SPC';
            return String.fromCharCode(i);
        }

        function drawGlyph(canvas, id) {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const data = FONT_DATA[id.toString()];
            if (!data) {
                ctx.strokeStyle = '#ef4444';
                ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
                return;
            }

            const width = data[0];
            const scale = 4;
            ctx.fillStyle = '#38bdf8'; // Audi Blue

            for (let row = 0; row < Math.min(data.length - 1, 7); row++) {
                const rowByte = data[row + 1];
                for (let col = 0; col < width; col++) {
                    if ((rowByte >> (5 - col)) & 1) {
                        ctx.fillRect(col * scale, (row + 1) * scale, scale, scale);
                    }
                }
            }
        }

        searchInput.addEventListener('input', (e) => {
            renderGrid(e.target.value);
        });

        // Initialize
        renderGrid();
    </script>
    <div id="status"></div>
</body>
</html>
